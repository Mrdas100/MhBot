<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MH IPTV - مولّد الأكواد</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      color: #00d4ff;
      text-shadow: 0 0 20px rgba(0,212,255,0.4);
      margin-bottom: 5px;
    }

    .header p {
      color: #888;
      font-size: 13px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 520px;
      margin-bottom: 20px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    }

    .card h2 {
      font-size: 15px;
      color: #00d4ff;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 10px 14px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus, select:focus {
      border-color: #00d4ff;
    }

    select option {
      background: #1a1a2e;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #0066cc);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-copy {
      background: #1e3a1e;
      color: #4caf50;
      border: 1px solid #4caf50;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-copy:hover { background: #4caf50; color: #fff; }

    .btn-clear {
      background: #3a1e1e;
      color: #f44336;
      border: 1px solid #f44336;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover { background: #f44336; color: #fff; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #0f0f1a;
      border-radius: 10px;
      overflow: hidden;
      margin: 14px 0 8px;
      display: none;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #0066cc);
      border-radius: 10px;
      transition: width 0.3s;
      width: 0%;
    }

    .progress-text {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-bottom: 10px;
      display: none;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .results-count {
      font-size: 12px;
      color: #4caf50;
      background: #1e3a1e;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .results-actions {
      display: flex;
      gap: 8px;
    }

    textarea {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      padding: 12px;
      resize: vertical;
      min-height: 200px;
      outline: none;
      line-height: 1.8;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-left: 6px;
    }

    .dot-idle { background: #888; }
    .dot-running { background: #ff9800; animation: pulse 1s infinite; }
    .dot-done { background: #4caf50; }
    .dot-error { background: #f44336; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .alert {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .alert-error { background: #3a1e1e; border: 1px solid #f44336; color: #f44336; }
    .alert-success { background: #1e3a1e; border: 1px solid #4caf50; color: #4caf50; }

    .credits-badge {
      background: #1e3a3a;
      border: 1px solid #00d4ff;
      color: #00d4ff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin-right: auto;
    }

    .host-info {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      text-align: center;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a2a4a;
      margin: 16px 0;
    }

    .format-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .format-btn {
      flex: 1;
      padding: 7px;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      background: #0f0f1a;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .format-btn.active {
      border-color: #00d4ff;
      color: #00d4ff;
      background: #0a1a2a;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>⚡ MH IPTV</h1>
    <p>مولّد أكواد الاشتراكات التلقائي</p>
  </div>

  <!-- بطاقة الإعدادات -->
  <div class="card">
    <h2>
      ⚙️ إعدادات الإنشاء
      <span class="credits-badge" id="creditsDisplay">كريدت: --</span>
    </h2>

    <div class="row">
      <div class="form-group">
        <label>عدد المستخدمين</label>
        <input type="number" id="userCount" value="10" min="1" max="200" placeholder="مثال: 10">
      </div>
      <div class="form-group">
        <label>الباقة</label>
        <select id="packageSelect">
          <option value="">-- اختر الباقة --</option>
          <option value="3months">3 أشهر (1 كريدت)</option>
          <option value="6months">6 أشهر (2 كريدت)</option>
          <option value="12months">سنة كاملة (4 كريدت)</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Host</label>
      <input type="text" id="hostInput" value="55500555.link:80" placeholder="مثال: server.link:80">
    </div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">جاري الإنشاء...</div>

    <button class="btn btn-primary" id="generateBtn" onclick="startGenerate()">
      🚀 إنشاء المستخدمين
    </button>

    <div class="alert alert-error" id="alertError"></div>
    <div class="alert alert-success" id="alertSuccess"></div>

    <div class="host-info">يتم الإنشاء مباشرة على سيرفر MH IPTV</div>
  </div>

  <!-- بطاقة النتائج -->
  <div class="card" id="resultsCard" style="display:none">
    <div class="results-header">
      <h2>📋 الأكواد الجاهزة <span class="status-dot dot-idle" id="statusDot"></span></h2>
      <span class="results-count" id="resultsCount">0 مستخدم</span>
    </div>

    <div class="format-toggle">
      <div class="format-btn active" id="fmt1" onclick="setFormat(1)">Username : ... Password : ... Host : ...</div>
      <div class="format-btn" id="fmt2" onclick="setFormat(2)">user:pass</div>
      <div class="format-btn" id="fmt3" onclick="setFormat(3)">سلة</div>
    </div>

    <div class="results-actions">
      <button class="btn-copy" onclick="copyAll()">📋 نسخ الكل</button>
      <button class="btn-clear" onclick="clearResults()">🗑️ مسح</button>
    </div>

    <hr class="divider">

    <textarea id="resultsArea" readonly placeholder="ستظهر الأكواد هنا..."></textarea>
  </div>

<script>
  const BASE_URL = 'https://cms.streamcreed.com/d33e53c4d1dc/userpanel/';
  const PACKAGES = {
    '3months':  { id: '36', label: '3 أشهر',  cost: 1 },
    '6months':  { id: '37', label: '6 أشهر',  cost: 2 },
    '12months': { id: '38', label: '12 شهر',  cost: 4 }
  };

  let generatedUsers = [];
  let currentFormat = 1;
  let isRunning = false;

  // توليد رقم عشوائي 8 خانات
  function randNum() {
    return Math.floor(10000000 + Math.random() * 90000000).toString();
  }

  // تحديث عرض الكريدت
  async function fetchCredits() {
    try {
      const r = await fetch(BASE_URL + 'index.php', { credentials: 'include' });
      const t = await r.text();
      const m = t.match(/Credits:\s*(\d+)/);
      if (m) document.getElementById('creditsDisplay').textContent = 'كريدت: ' + m[1];
    } catch(e) {}
  }

  // إنشاء مستخدم واحد
  async function createUser(username, password, packageId) {
    // الخطوة 1: جلب الصفحة للحصول على الـ form data
    const pageResp = await fetch(BASE_URL + 'add_user.php', { credentials: 'include' });
    const pageText = await pageResp.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(pageText, 'text/html');
    const form = doc.querySelector('form');

    const formData = new FormData();
    if (form) {
      for (const el of form.elements) {
        if (el.name && el.type !== 'submit') formData.append(el.name, el.value || '');
      }
    }
    formData.set('username', username);
    formData.set('password', password);
    formData.set('package_id', packageId);

    const resp1 = await fetch(BASE_URL + 'add_user.php', {
      method: 'POST', body: formData, credentials: 'include'
    });
    const text1 = await resp1.text();
    const doc1 = parser.parseFromString(text1, 'text/html');

    // الخطوة 2: إذا ظهر line_type
    if (doc1.querySelector('#line_type')) {
      const form2 = doc1.querySelector('form');
      const formData2 = new FormData();
      if (form2) {
        for (const el of form2.elements) {
          if (el.name && el.type !== 'submit') formData2.append(el.name, el.value || '');
        }
      }
      formData2.set('username', username);
      formData2.set('password', password);
      formData2.set('package_id', packageId);
      formData2.set('line_type', 'official');

      const resp2 = await fetch(BASE_URL + 'add_user.php?action=add_user', {
        method: 'POST', body: formData2, credentials: 'include'
      });
      const text2 = await resp2.text();
      return text2.includes('User added') || text2.includes('successfully') || !text2.includes('error');
    }

    return text1.includes('User added') || text1.includes('successfully') || !text1.includes('error');
  }

  // تنسيق النتائج
  function formatResults() {
    const host = document.getElementById('hostInput').value.trim();
    if (currentFormat === 1) {
      return generatedUsers.map(u =>
        `Username : ${u.user} Password : ${u.pass} Host : ${host}`
      ).join('\n');
    } else if (currentFormat === 2) {
      return generatedUsers.map(u => `${u.user}:${u.pass}`).join('\n');
    } else {
      return generatedUsers.map(u =>
        `اسم المستخدم : ${u.user}\nكلمة المرور : ${u.pass}\nHost : ${host}`
      ).join('\n\n');
    }
  }

  function setFormat(n) {
    currentFormat = n;
    document.querySelectorAll('.format-btn').forEach((b, i) => {
      b.classList.toggle('active', i + 1 === n);
    });
    document.getElementById('resultsArea').value = formatResults();
  }

  function showAlert(type, msg) {
    const el = document.getElementById('alert' + (type === 'error' ? 'Error' : 'Success'));
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  async function startGenerate() {
    if (isRunning) return;

    const count = parseInt(document.getElementById('userCount').value);
    const pkg = document.getElementById('packageSelect').value;
    const host = document.getElementById('hostInput').value.trim();

    if (!count || count < 1) return showAlert('error', '⚠️ أدخل عدداً صحيحاً');
    if (!pkg) return showAlert('error', '⚠️ اختر الباقة أولاً');
    if (!host) return showAlert('error', '⚠️ أدخل الـ Host');

    isRunning = true;
    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = '⏳ جاري الإنشاء...';

    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    progressBar.style.display = 'block';
    progressText.style.display = 'block';

    document.getElementById('resultsCard').style.display = 'block';
    document.getElementById('statusDot').className = 'status-dot dot-running';

    const packageId = PACKAGES[pkg].id;
    let success = 0;
    let failed = 0;
    const newUsers = [];

    for (let i = 0; i < count; i++) {
      const user = randNum();
      const pass = randNum();

      progressText.textContent = `إنشاء ${i + 1} من ${count}... (نجح: ${success} | فشل: ${failed})`;
      progressFill.style.width = ((i / count) * 100) + '%';

      try {
        const ok = await createUser(user, pass, packageId);
        if (ok) {
          success++;
          newUsers.push({ user, pass });
          generatedUsers.push({ user, pass });
        } else {
          failed++;
        }
      } catch(e) {
        failed++;
      }

      // تحديث النتائج فوراً
      document.getElementById('resultsArea').value = formatResults();
      document.getElementById('resultsCount').textContent = generatedUsers.length + ' مستخدم';

      await new Promise(r => setTimeout(r, 600));
    }

    progressFill.style.width = '100%';
    progressText.textContent = `✅ اكتمل! نجح: ${success} | فشل: ${failed}`;
    document.getElementById('statusDot').className = 'status-dot dot-done';

    btn.disabled = false;
    btn.textContent = '🚀 إنشاء المستخدمين';
    isRunning = false;

    showAlert('success', `✅ تم إنشاء ${success} مستخدم بنجاح!`);
    fetchCredits();
  }

  function copyAll() {
    const text = document.getElementById('resultsArea').value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      showAlert('success', '✅ تم النسخ!');
    });
  }

  function clearResults() {
    generatedUsers = [];
    document.getElementById('resultsArea').value = '';
    document.getElementById('resultsCount').textContent = '0 مستخدم';
    document.getElementById('resultsCard').style.display = 'none';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('progressText').style.display = 'none';
  }

  // تحميل الكريدت عند فتح الصفحة
  fetchCredits();
</script>

</body>
</html>
